name: Auto Update Market Data

on:
  schedule:
    - cron: '*/10 13-20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'          

      - name: 安装依赖包
        run: |
          pip install yfinance pytz

      - name: 运行 Python 抓取脚本
        run: python fetch_data.py

      - name: 自动提交最新的 data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Auto update data.json" || exit 0
          git push
