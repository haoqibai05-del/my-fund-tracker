<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风吟夜梦春的纳指标普行情面板</title>
    <script src="https://cdn.staticfile.net/echarts/5.5.0/echarts.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        .top-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .index-box { background: #1e1e1e; padding: 15px 5px; border-radius: 8px; text-align: center; font-size: 14px; }
        .index-name { color: #888; font-size: 12px; margin-bottom: 5px; }
        .up { color: #ff4d4f; }
        .down { color: #00e676; }
        
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .chart-container { background: #1e1e1e; border-radius: 10px; padding: 10px; height: 300px; }
        .time-hint { text-align: center; font-size: 12px; color: #888; margin-bottom: 15px; }

        .fund-section { margin-top: 30px; margin-bottom: 30px; }
        .fund-list-container { display: flex; flex-direction: column; gap: 8px; }
        .fund-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #1e1e1e; padding: 15px 12px; border-radius: 4px;
            border-left: 3px solid #333; transition: all 0.3s;
        }
        .fund-row.up { border-left-color: #ff4d4f; }
        .fund-row.down { border-left-color: #00e676; }
        .f-name { font-size: 15px; color: #ddd; font-weight: 500; }
        .f-desc { font-size: 12px; color: #666; margin-top: 4px; }
        .f-est { font-size: 16px; font-weight: bold; text-align: right; }
    </style>
</head>
<body>

    <div class="time-hint" id="updateTime">真实持仓计算加载中...</div>

    <div class="top-bar" id="topIndices">
        <div class="index-box"><div class="index-name">纳指综合</div><div id="val-ixic">--</div></div>
        <div class="index-box"><div class="index-name">纳斯达克100</div><div id="val-ndx">--</div></div>
        <div class="index-box"><div class="index-name">标普500</div><div id="val-spx">--</div></div>
        <div class="index-box"><div class="index-name">标普等权</div><div id="val-spxew">--</div></div>
        <div class="index-box"><div class="index-name">USD/CNH</div><div id="val-cnh">--</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-container" id="chart-ndx"></div>
        <div class="chart-container" id="chart-spx"></div>
        <div class="chart-container" id="chart-spxew"></div>
        <div class="chart-container" id="chart-cnh"></div>
    </div>

    <div class="fund-section">
        <div class="fund-list-container" id="fundTable">
            </div>
    </div>

    <script>
        const charts = {};

        function initChart(domId, title) {
            const chart = echarts.init(document.getElementById(domId), 'dark', { background: 'transparent' });
            chart.setOption({
                title: { text: title, textStyle: { fontSize: 14, color: '#aaa' }, left: 'center' },
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                grid: { left: '10%', right: '5%', bottom: '15%', top: '15%' },
                xAxis: { type: 'category', data: [], scale: true, boundaryGap: false, axisLine: { onZero: false }, splitLine: { show: false } },
                yAxis: { type: 'value', scale: true, splitLine: { lineStyle: { color: '#333' } } },
                series: [{
                    type: 'candlestick',
                    data: [],
                    // 国内习惯：红涨绿跌
                    itemStyle: { color: '#ff4d4f', borderColor: '#ff4d4f', color0: '#00e676', borderColor0: '#00e676' }
                }]
            });
            charts[domId] = chart;
        }

        initChart('chart-ndx', '纳斯达克100 盘中走势');
        initChart('chart-spx', '标普500 盘中走势');
        initChart('chart-spxew', '标普500等权重 盘中走势');
        initChart('chart-cnh', '离岸人民币(USD/CNH)走势');

        // 【高精度成分股配置库】根据最新公开季报权重设定
        const fundConfigs = [
            { 
                name: '华宝纳斯达克精选', 
                baseIndex: '^NDX', 
                totalWeight: 0.92, 
                holdings: [
                    { symbol: 'NFLX', weight: 0.0932 }, 
                    { symbol: 'NVDA', weight: 0.0928 }, 
                    { symbol: 'AAPL', weight: 0.0776 },
                    { symbol: 'MSFT', weight: 0.0750 },
                    { symbol: 'AVGO', weight: 0.0743 }
                ]
            },
            { 
                name: '易方达全球成长精选', 
                baseIndex: '^GSPC', 
                totalWeight: 0.90,
                holdings: [
                    { symbol: 'TSM', weight: 0.0888 }, 
                    { symbol: 'LITE', weight: 0.0868 },
                    { symbol: 'GLW', weight: 0.0467 },
                    { symbol: 'GOOGL', weight: 0.0336 }
                ]
            },
            { 
                name: '华夏全球科技先锋', 
                baseIndex: '^NDX',
                totalWeight: 0.88, 
                holdings: [
                    { symbol: 'VIAV', weight: 0.0452 },
                    { symbol: 'GLW', weight: 0.0415 },
                    { symbol: 'WDC', weight: 0.0266 },
                    { symbol: 'MU', weight: 0.0230 },
                    { symbol: 'AEIS', weight: 0.0163 },
                    { symbol: 'TER', weight: 0.0162 }
                ]
            }
        ];

        async function fetchMarketData() {
            try {
                const res = await fetch('/api/market');
                const result = await res.json();
                
                // 【前端防崩溃机制】如果获取数据异常，优雅显示报错信息
                if (result.error || !result.data) {
                    document.getElementById('updateTime').innerHTML = `<span style="color:#ff4d4f;">数据获取异常: ${result.error || 'API连接失败，请稍后重试'}</span>`;
                    return; // 终止后续操作，防止页面死机黑屏
                }
                
                const indices = result.data.indices;
                const stocks = result.data.stocks;

                document.getElementById('updateTime').innerHTML = `穿透底层成分股高精度计算，最后更新于 ${result.updateTime}`;

                const updateTopBox = (id, symbol) => {
                    const data = indices[symbol];
                    if (!data) return;
                    const color = data.change >= 0 ? 'up' : 'down';
                    const sign = data.change > 0 ? '+' : '';
                    document.getElementById(id).innerHTML = `
                        <span style="font-size: 16px; font-weight: bold;">${data.price}</span><br>
                        <span class="${color}" style="font-size: 12px;">${sign}${data.change}%</span>
                    `;
                };
                updateTopBox('val-ixic', '^IXIC');
                updateTopBox('val-ndx', '^NDX');
                updateTopBox('val-spx', '^GSPC');
                updateTopBox('val-spxew', '^SPXEW');
                updateTopBox('val-cnh', 'CNH=X');

                const updateChart = (domId, symbol) => {
                    const data = indices[symbol];
                    if (!data || !data.trend) return;
                    const trendData = data.trend;
                    const times = trendData.map(item => item[0]);
                    const klines = trendData.map(item => [item[1], item[2], item[3], item[4]]);
                    charts[domId].setOption({ xAxis: { data: times }, series: [{ data: klines }] });
                };
                updateChart('chart-ndx', '^NDX');
                updateChart('chart-spx', '^GSPC');
                updateChart('chart-spxew', '^SPXEW');
                updateChart('chart-cnh', 'CNH=X');

                // 渲染基金列表
                const cnhChange = indices['CNH=X'] ? parseFloat(indices['CNH=X'].change) : 0;
                let fundHtml = '';

                fundConfigs.forEach(fund => {
                    let stockContribution = 0;
                    let knownWeight = 0;

                    // 1. 已知重仓股涨跌贡献
                    fund.holdings.forEach(h => {
                        const stockData = stocks[h.symbol];
                        if(stockData) {
                            stockContribution += stockData.change * h.weight;
                            knownWeight += h.weight;
                        }
                    });

                    // 2. 隐蔽仓位拟合贡献
                    const remainWeight = fund.totalWeight - knownWeight;
                    let indexContribution = 0;
                    if(remainWeight > 0 && indices[fund.baseIndex]) {
                        indexContribution = indices[fund.baseIndex].change * remainWeight;
                    }

                    // 3. 估算涨跌幅 = 个股贡献 + 隐蔽仓位贡献 + 汇率涨跌幅
                    const estChange = stockContribution + indexContribution + cnhChange;
                    
                    const colorCls = estChange >= 0 ? 'up' : 'down';
                    const sign = estChange > 0 ? '+' : '';
                    
                    // 显示被穿透的重仓股用于核验
                    const displayHoldings = fund.holdings.map(h => h.symbol).join(', ');

                    fundHtml += `
                        <div class="fund-row ${colorCls}">
                            <div>
                                <div class="f-name">${fund.name}</div>
                                <div class="f-desc">穿透计算: ${displayHoldings} 等</div>
                            </div>
                            <div class="f-est ${colorCls}">${sign}${estChange.toFixed(2)}%</div>
                        </div>
                    `;
                });
                
                document.getElementById('fundTable').innerHTML = fundHtml;

            } catch (err) {
                console.error("刷新失败", err);
                document.getElementById('updateTime').innerHTML = `<span style="color:#ff4d4f;">网络异常或跨域阻止，无法连接数据源</span>`;
            }
        }

        fetchMarketData();
        setInterval(fetchMarketData, 60000); 
        window.addEventListener('resize', () => { Object.values(charts).forEach(c => c.resize()); });
    </script>
</body>
</html>
