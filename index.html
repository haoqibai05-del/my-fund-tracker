<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简美股估值</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.staticfile.net/echarts/5.5.0/echarts.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f5f7fa; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .up { color: #f56c6c; font-weight: bold; }
        .down { color: #67c23a; font-weight: bold; }
        .time-text { font-size: 12px; color: #909399; }
    </style>
</head>
<body>

    <div class="card">
        <h2>实时估算面板</h2>
        <p class="time-text" id="updateTime">最后更新：读取中...</p>
        
        <div id="dataList" style="margin-top: 15px; line-height: 1.8;">
            <!-- 数据将通过 JS 渲染到这里 -->
        </div>
    </div>

    <div class="card">
        <!-- 图表容器 -->
        <div id="chartBox" style="width: 100%; height: 350px;"></div>
    </div>

    <script>
        // 读取同目录下的 data.json
        fetch('./data.json')
            .then(res => res.json())
            .then(data => {
                // 1. 渲染文字数据
                document.getElementById('updateTime').innerText = `最后更新：${data.updateTime}`;
                
                const formatHtml = (item) => {
                    let color = item.changePercent >= 0 ? 'up' : 'down';
                    let sign = item.changePercent > 0 ? '+' : '';
                    return `<div><b>${item.name}</b>: ${item.points} 点 | <span class="${color}">${sign}${item.changePercent}%</span></div>`;
                };

                let listHtml = formatHtml(data.nasdaq100) + formatHtml(data.sp500ew) + formatHtml(data.exchangeRate);
                document.getElementById('dataList').innerHTML = listHtml;

                // 2. 渲染 ECharts 柱状图
                let myChart = echarts.init(document.getElementById('chartBox'));
                let option = {
                    title: { text: '今日涨跌幅概览', textStyle: { fontSize: 16 } },
                    tooltip: { formatter: '{b}: {c}%' },
                    xAxis: { type: 'category', data: ['纳指 100', '标普等权', '汇率'] },
                    yAxis: { type: 'value', axisLabel: { formatter: '{value}%' } },
                    series: [{
                        type: 'bar',
                        barWidth: '40%',
                        data: [
                            { value: data.nasdaq100.changePercent, itemStyle: { color: data.nasdaq100.changePercent >= 0 ? '#f56c6c' : '#67c23a' } },
                            { value: data.sp500ew.changePercent, itemStyle: { color: data.sp500ew.changePercent >= 0 ? '#f56c6c' : '#67c23a' } },
                            { value: data.exchangeRate.changePercent, itemStyle: { color: data.exchangeRate.changePercent >= 0 ? '#f56c6c' : '#67c23a' } }
                        ]
                    }]
                };
                myChart.setOption(option);
            })
            .catch(err => console.error('读取数据失败:', err));
    </script>
</body>
</html>
