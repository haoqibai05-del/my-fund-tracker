<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro行情看板 - K线版</title>
    <script src="https://cdn.staticfile.net/echarts/5.5.0/echarts.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        /* 顶部 5 格布局 */
        .top-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .index-box { background: #1e1e1e; padding: 15px 5px; border-radius: 8px; text-align: center; font-size: 14px; }
        .index-name { color: #888; font-size: 12px; margin-bottom: 5px; }
        .up { color: #ff4d4f; }
        .down { color: #00e676; }
        
        /* 图表网格布局：PC端一行两个，手机端一行一个 */
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .chart-container { background: #1e1e1e; border-radius: 10px; padding: 10px; height: 300px; }
        .time-hint { text-align: center; font-size: 12px; color: #888; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="time-hint" id="updateTime">盘中数据加载中...</div>

    <div class="top-bar" id="topIndices">
        <div class="index-box"><div class="index-name">纳指综合</div><div id="val-ixic">--</div></div>
        <div class="index-box"><div class="index-name">纳斯达克100</div><div id="val-ndx">--</div></div>
        <div class="index-box"><div class="index-name">标普500</div><div id="val-spx">--</div></div>
        <div class="index-box"><div class="index-name">标普等权</div><div id="val-spxew">--</div></div>
        <div class="index-box"><div class="index-name">USD/CNH</div><div id="val-cnh">--</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-container" id="chart-ndx"></div>
        <div class="chart-container" id="chart-spx"></div>
        <div class="chart-container" id="chart-spxew"></div>
        <div class="chart-container" id="chart-cnh"></div>
    </div>

    <script>
        // 存储 ECharts 实例以便后续更新
        const charts = {};

        // 初始化图表配置
        function initChart(domId, title) {
            const chart = echarts.init(document.getElementById(domId), 'dark', { background: 'transparent' });
            chart.setOption({
                title: { text: title, textStyle: { fontSize: 14, color: '#aaa' }, left: 'center' },
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                grid: { left: '10%', right: '5%', bottom: '15%', top: '15%' },
                xAxis: { type: 'category', data: [], scale: true, boundaryGap: false, axisLine: { onZero: false }, splitLine: { show: false } },
                yAxis: { type: 'value', scale: true, splitLine: { lineStyle: { color: '#333' } } },
                series: [{
                    type: 'candlestick', // 画 K 线图
                    data: [],
                    itemStyle: { color: '#00e676', color0: '#ff4d4f', borderColor: '#00e676', borderColor0: '#ff4d4f' } // 绿涨红跌(美股习惯)
                }]
            });
            charts[domId] = chart;
        }

        initChart('chart-ndx', '纳斯达克100 盘中走势');
        initChart('chart-spx', '标普500 盘中走势');
        initChart('chart-spxew', '标普500等权重 盘中走势');
        initChart('chart-cnh', '离岸人民币(USD/CNH)走势'); // 汇率通常用折线图更好，这里统一用 K线演示

        async function fetchMarketData() {
            try {
                const res = await fetch('/api/market');
                const result = await res.json();
                const market = result.data;

                document.getElementById('updateTime').innerHTML = `数据最后更新于 ${result.updateTime} (自动刷新)`;

                // 1. 更新顶部数值
                const updateTopBox = (id, symbol) => {
                    const data = market[symbol];
                    const color = data.change >= 0 ? 'up' : 'down';
                    const sign = data.change > 0 ? '+' : '';
                    document.getElementById(id).innerHTML = `
                        <span style="font-size: 16px; font-weight: bold;">${data.price}</span><br>
                        <span class="${color}" style="font-size: 12px;">${sign}${data.change}%</span>
                    `;
                };
                updateTopBox('val-ixic', '^IXIC');
                updateTopBox('val-ndx', '^NDX');
                updateTopBox('val-spx', '^GSPC');
                updateTopBox('val-spxew', '^SPXEW');
                updateTopBox('val-cnh', 'CNH=X');

                // 2. 更新图表数据
                const updateChart = (domId, symbol) => {
                    const trendData = market[symbol].trend;
                    const times = trendData.map(item => item[0]);
                    const klines = trendData.map(item => [item[1], item[2], item[3], item[4]]); // O, C, L, H
                    
                    charts[domId].setOption({
                        xAxis: { data: times },
                        series: [{ data: klines }]
                    });
                };
                updateChart('chart-ndx', '^NDX');
                updateChart('chart-spx', '^GSPC');
                updateChart('chart-spxew', '^SPXEW');
                updateChart('chart-cnh', 'CNH=X');

            } catch (err) {
                console.error("刷新失败", err);
            }
        }

        fetchMarketData();
        setInterval(fetchMarketData, 60000); // 1分钟刷新
        
        // 随窗口缩放自适应图表
        window.addEventListener('resize', () => { Object.values(charts).forEach(c => c.resize()); });
    </script>
</body>
</html>
